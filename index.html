            gap: 6px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .post-reply-btn:active { background: var(--bg-secondary); }

        /* Comments */
        .comment-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .comment-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .comment-bubble {
            flex: 1;
            background: var(--bg-tertiary);
            border-radius: 0 12px 12px 12px;
            padding: 8px 12px;
        }

        .comment-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
        .comment-text { font-size: 13px; line-height: 1.5; }
        .comment-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

        /* New post input bar */
        .project-input-bar {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding-bottom: calc(12px + var(--safe-bottom));
        }

        .project-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 10px 14px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .project-input-row:active { border-color: var(--accent); }

        /* Progress bar for project */
        .project-progress {
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            margin: 8px 0 0;
            overflow: hidden;
        }

        .project-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        /* Teacher feedback badge */
        .teacher-feedback {
            margin: 0 16px 12px;
            background: rgba(0,229,160,0.08);
            border: 1px solid rgba(0,229,160,0.2);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }


        /* ============ THEME VARIABLES ============ */
        [data-theme="dark"] {
            --bg-primary:#0d1117; --bg-secondary:#161b22; --bg-tertiary:#21262d; --bg-card:#1c2128;
            --accent:#00e5a0; --accent-dim:#00c48c; --accent-glow:rgba(0,229,160,0.15);
            --text-primary:#f0f6fc; --text-secondary:#8b949e; --text-muted:#484f58; --border:#30363d;
            --danger:#ff5370; --warning:#ffa657; --info:#58a6ff; --purple:#c084fc;
        }
        [data-theme="light"] {
            --bg-primary:#f8fafc; --bg-secondary:#ffffff; --bg-tertiary:#f1f5f9; --bg-card:#ffffff;
            --accent:#00b37e; --accent-dim:#009668; --accent-glow:rgba(0,179,126,0.12);
            --text-primary:#0f172a; --text-secondary:#475569; --text-muted:#94a3b8; --border:#e2e8f0;
            --danger:#ef4444; --warning:#f59e0b; --info:#3b82f6; --purple:#9333ea;
        }
        html, body, .app-shell, .app-header, .bottom-nav, .app-content,
        .bottom-sheet, .content-screen, .chat-detail-screen, .admin-list-screen, .project-screen,
        .data-card, .info-list, .stat-card-m, .notice-card, .mark-card, .batch-card {
            transition: background-color 0.25s, border-color 0.25s, color 0.25s;
        }
        [data-theme="light"] .msg-bubble.sent .msg-content { background: linear-gradient(135deg,#00b37e,#00c48c); }
        [data-theme="light"] .toast-success { background:#f0fdf4; color:#166534; border-color:#bbf7d0; }
        [data-theme="light"] .toast-error { background:#fef2f2; color:#991b1b; border-color:#fecaca; }

        /* ============ THEME TOGGLE in header ============ */
        #themeToggleBtn { font-size:18px !important; }
        .header-avatar { cursor:pointer; transition:transform 0.15s, box-shadow 0.15s; }
        .header-avatar:active { transform:scale(0.92); }

        /* ============ TOPPER BANNER ============ */
        #topperBanner {
            background: linear-gradient(135deg, rgba(255,166,87,0.15), rgba(255,83,112,0.08));
            border-bottom: 1px solid rgba(255,166,87,0.3);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            overflow: hidden;
        }
        #topperBanner.hidden { display: none; }
        .topper-trophy { font-size: 20px; flex-shrink: 0; animation: pulse 2s ease-in-out infinite; }
        .topper-scroll { overflow: hidden; flex: 1; min-width: 0; }
        .topper-track { display: flex; gap: 40px; white-space: nowrap; animation: topperScroll 18s linear infinite; }
        .topper-track:hover { animation-play-state: paused; }
        .topper-item { display: inline-flex; align-items: center; gap: 8px; }
        .topper-rank { font-size: 11px; font-weight: 800; color: var(--warning); background: rgba(255,166,87,0.15); border: 1px solid rgba(255,166,87,0.3); padding: 2px 7px; border-radius: 8px; }
        .topper-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
        .topper-pct { font-size: 12px; font-weight: 700; color: var(--accent); }
        .topper-sem { font-size: 11px; color: var(--text-muted); }
        @keyframes topperScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

        /* ============ TIMETABLE ============ */
        .tt-day-scroll { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; flex-shrink:0; background:var(--bg-secondary); border-bottom:1px solid var(--border); }
        .tt-day-scroll::-webkit-scrollbar { display:none; }
        .tt-day-btn { padding:8px 16px; border-radius:20px; font-size:13px; font-weight:700; border:1.5px solid var(--border); cursor:pointer; white-space:nowrap; transition:all 0.2s; font-family:inherit; background:var(--bg-tertiary); color:var(--text-secondary); flex-shrink:0; }
        .tt-day-btn.active { background:var(--accent); color:#0d1117; border-color:var(--accent); }
        .tt-day-btn.today-indicator { border-color:var(--accent); color:var(--accent); }
        .tt-period-card { background:var(--bg-card); border:1px solid var(--border); border-left:4px solid var(--accent); border-radius:16px; padding:14px 16px; margin-bottom:10px; animation:fadeUp 0.3s ease both; display:flex; gap:14px; align-items:flex-start; }
        .tt-time-col { display:flex; flex-direction:column; align-items:center; min-width:54px; flex-shrink:0; }
        .tt-time-start { font-size:13px; font-weight:700; color:var(--text-primary); }
        .tt-time-end { font-size:10px; color:var(--text-muted); margin-top:2px; }
        .tt-time-dur { font-size:10px; color:var(--text-muted); margin-top:4px; font-weight:600; }
        .tt-content { flex:1; min-width:0; }
        .tt-subject { font-size:15px; font-weight:700; margin-bottom:4px; color:var(--text-primary); }
        .tt-teacher { font-size:12px; color:var(--text-secondary); margin-bottom:6px; display:flex; align-items:center; gap:4px; }
        .tt-pills { display:flex; gap:6px; flex-wrap:wrap; }
        .tt-break { text-align:center; padding:8px; margin-bottom:8px; }
        .tt-break-inner { display:inline-flex; align-items:center; gap:6px; background:var(--bg-tertiary); border:1px dashed var(--border); border-radius:20px; padding:6px 14px; font-size:11px; color:var(--text-muted); font-weight:600; }
        .tt-no-class { text-align:center; padding:50px 20px; }
        .tt-no-class i { font-size:48px; color:var(--text-muted); opacity:0.3; margin-bottom:12px; display:block; }
        .tt-no-class p { font-size:14px; color:var(--text-muted); }
        .tt-today-banner { background:rgba(0,229,160,0.08); border:1px solid rgba(0,229,160,0.2); border-radius:12px; padding:10px 14px; margin-bottom:14px; display:flex; align-items:center; gap:10px; font-size:13px; font-weight:600; color:var(--accent); }

        /* ============ ACHIEVEMENTS ============ */
        .achievement-card { background:var(--bg-card); border:1px solid var(--border); border-radius:18px; padding:16px; margin-bottom:12px; animation:fadeUp 0.3s ease both; position:relative; overflow:hidden; }
        .achievement-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
        .achievement-card.cat-project::before { background:linear-gradient(90deg,var(--info),var(--purple)); }
        .achievement-card.cat-skill::before { background:linear-gradient(90deg,var(--accent),var(--info)); }
        .achievement-card.cat-award::before { background:linear-gradient(90deg,var(--warning),var(--danger)); }
        .achievement-card.cat-research::before { background:linear-gradient(90deg,var(--purple),var(--danger)); }
        .achievement-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; margin-bottom:10px; }
        .achievement-title { font-size:16px; font-weight:800; margin-bottom:6px; color:var(--text-primary); }
        .achievement-desc { font-size:13px; color:var(--text-secondary); line-height:1.55; margin-bottom:10px; }
        .achievement-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .achievement-student { display:flex; align-items:center; gap:8px; }
        .achievement-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#0d1117; background:linear-gradient(135deg,var(--accent),var(--info)); flex-shrink:0; }
        .achievement-student-name { font-size:13px; font-weight:700; color:var(--text-primary); }
        .achievement-date { font-size:11px; color:var(--text-muted); margin-left:auto; }

        /* ============ MARKS ENTRY ============ */
        .marks-student-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:14px 16px; margin-bottom:10px; animation:fadeUp 0.3s ease both; }
        .marks-student-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
        .marks-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
        .marks-cell { background:var(--bg-tertiary); border-radius:10px; padding:10px; text-align:center; position:relative; }
        .marks-cell-label { font-size:10px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
        .marks-cell-val { font-size:20px; font-weight:800; }
        .marks-cell-max { font-size:10px; color:var(--text-muted); }
        .marks-edit-btn { position:absolute; top:6px; right:6px; width:20px; height:20px; border-radius:50%; background:var(--accent); border:none; color:#0d1117; font-size:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; }
        .marks-cell:hover .marks-edit-btn { opacity:1; }
        .marks-add-btn { width:100%; padding:10px; border-radius:12px; border:1.5px dashed var(--border); background:transparent; color:var(--accent); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; margin-top:4px; }
        .marks-add-btn:active { background:var(--accent-glow); }

        /* ============ GLOBAL MOBILE UI IMPROVEMENTS ============ */

        /* Smooth page-level transitions */
        @keyframes tabIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .app-content > * { animation: tabIn 0.22s ease both; }

        /* Better touch targets */
        button, [onclick] { -webkit-tap-highlight-color: transparent; }

        /* ---- CHAT ROW ---- */
        .chat-row { border-radius: 16px; margin: 0 8px 2px; padding: 12px 12px; }
        .chat-row:active { background: var(--bg-tertiary); transform: scale(0.99); }
        .chat-row-avatar { width: 50px; height: 50px; border-radius: 16px; }
        .chat-row-avatar .status-dot { bottom: -2px; right: -2px; border-radius: 50%; }
        .chat-row-name { font-size: 14px; font-weight: 700; }
        .chat-row-preview { font-size: 12px; }
        .chat-section-label { padding: 12px 20px 4px; font-size: 10px; }

        /* ---- BATCH CARD ---- */
        .batch-card { border-radius: 18px; padding: 14px 16px; margin: 0 0 8px 0; }
        .batch-card:active { transform: scale(0.98); }
        .batch-card-avatar { border-radius: 14px; font-size: 20px; }

        /* ---- STAT CARDS ---- */
        .stat-card-m { border-radius: 20px; }
        .stat-value { font-size: 36px; }

        /* ---- PILLS ---- */
        .pill { font-size: 10px; padding: 3px 10px; font-weight: 700; border-radius: 8px; }

        /* ---- DATA CARDS ---- */
        .data-card { border-radius: 16px; padding: 14px; }

        /* ---- NOTICE CARDS ---- */
        .notice-card { border-radius: 16px; padding: 14px; }
        .notice-title { font-size: 14px; }
        .notice-body { font-size: 12px; }

        /* ---- MARK CARDS ---- */
        .mark-card { border-radius: 16px; padding: 14px; }
        .mark-subject { font-size: 14px; }

        /* ---- ACTION BUTTONS ---- */
        .action-btn { border-radius: 16px; padding: 14px 16px; font-size: 14px; margin-bottom: 8px; }
        .action-btn i { font-size: 15px; }

        /* ---- PROFILE HERO ---- */
        .profile-hero { padding: 24px 16px 20px; }
        .profile-name { font-size: 20px; }

        /* ---- SECTION TITLE ---- */
        .section-title { font-size: 11px; margin: 16px 0 8px; }

        /* ---- BOTTOM SHEET ---- */
        .sheet-title { font-size: 17px; font-weight: 800; margin-bottom: 18px; }
        .field-label { font-size: 11px; margin-bottom: 5px; }
        .field-input, .field-select { padding: 12px 14px; border-radius: 12px; font-size: 14px; }
        .field-input:focus, .field-select:focus { box-shadow: 0 0 0 3px var(--accent-glow); }

        /* ---- EMPTY STATE ---- */
        .empty-state { padding: 50px 20px; }
        .empty-state i { font-size: 44px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 17px; }
        .empty-state p { font-size: 13px; }

        /* ---- ATTENDANCE ITEM ---- */
        .attendance-item { border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; }

        /* ---- MARK CELL ---- */
        .mark-cell { border-radius: 12px; padding: 10px 8px; }
        .mark-cell-val { font-size: 20px; }

        /* ---- QUICK ACCESS GRID (student home) ---- */
        .quick-grid-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 14px;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .quick-grid-card:active { background: var(--bg-tertiary); transform: scale(0.97); }

        /* ---- TOPPER BANNER ---- */
        #topperBanner {
            padding: 8px 14px;
            border-bottom: 1px solid rgba(255,166,87,0.2);
            background: linear-gradient(90deg, rgba(255,166,87,0.08) 0%, rgba(255,83,112,0.05) 100%);
        }

        /* ---- HEADER QUALITY ---- */
        .app-header { box-shadow: 0 1px 0 var(--border); }

        /* ---- CONTENT PADDING HELPER ---- */
        .content-pad { padding: 14px 16px; }
        .content-pad-bottom { padding-bottom: 90px; }

        /* ---- GROUP CARD ---- */
        .group-card { border-radius: 20px; padding: 16px 14px; }
        .group-card:active { transform: scale(0.99); }
        .group-avatar { border-radius: 14px; }

        /* ---- POST CARD ---- */
        .post-card { border-radius: 20px; }
        .post-author-name { font-size: 13px; }

        /* ---- ACHIEVEMENT CARD ---- */
        .achievement-card { border-radius: 20px; padding: 16px 14px; }
        .achievement-title { font-size: 15px; }
        .achievement-desc { font-size: 12px; }

        /* ---- MARKS STUDENT CARD ---- */
        .marks-student-card { border-radius: 18px; padding: 14px; }
        .marks-add-btn { border-radius: 12px; padding: 10px; font-size: 13px; margin-top: 6px; }
        .marks-cell { border-radius: 10px; }
        .marks-cell-val { font-size: 18px; }

        /* ---- TIMETABLE ---- */
        .tt-period-card { border-radius: 16px; margin-bottom: 8px; }
        .tt-subject { font-size: 14px; }

        /* ---- TOAST ---- */
        .toast-msg { border-radius: 16px; padding: 13px 16px; font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

        /* ---- LOADER ---- */
        .loader-overlay { background: rgba(0,0,0,0.6); }

        /* ---- ADMIN M STAT ---- */
        .admin-m-stat { border-radius: 20px; padding: 16px 14px; }
        .admin-m-stat-num { font-size: 28px; }
        .admin-m-menu-card { border-radius: 18px; padding: 14px; }
        .admin-m-menu-icon { border-radius: 12px; }

        /* ---- INFO LIST ---- */
        .info-row { padding: 12px 14px; }
        .info-icon { border-radius: 10px; width: 34px; height: 34px; font-size: 13px; }
        .info-value { font-size: 13px; }

        /* ---- SCROLLBAR HIDE ---- */
        * { scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }

    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Loader -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-ring"></div>

    <!-- Sheet overlay -->
    <div class="sheet-overlay" id="sheetOverlay" onclick="closeAllSheets()"></div>

    <!-- Hidden file inputs for media -->

    <!-- ============ SPLASH SCREEN ============ -->
    <div id="splashScreen" style="
        position:fixed;inset:0;z-index:9999;
        background:linear-gradient(180deg,#0a0f1e 0%,#0b1628 40%,#081018 100%);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        overflow:hidden;
        transition:opacity 0.7s ease, transform 0.7s ease;
    ">
    <style>
        /* \u2500\u2500 SPLASH KEYFRAMES \u2500\u2500 */
        @keyframes sHexDraw   { to { stroke-dashoffset: 0; } }
        @keyframes sNodePop   { 0%{opacity:0;transform:scale(0)} 70%{transform:scale(1.4)} 100%{opacity:1;transform:scale(1)} }
        @keyframes sGlowPulse { 0%,100%{filter:drop-shadow(0 0 6px rgba(0,229,160,0.5))} 50%{filter:drop-shadow(0 0 18px rgba(0,229,160,0.9))} }
        @keyframes sGoldPulse { 0%,100%{filter:drop-shadow(0 0 5px rgba(250,185,50,0.6))} 50%{filter:drop-shadow(0 0 14px rgba(250,185,50,1))} }
        @keyframes sSpark     { 0%{transform:rotate(0deg) scale(1);opacity:1} 50%{transform:rotate(180deg) scale(1.5);opacity:0.8} 100%{transform:rotate(360deg) scale(1);opacity:1} }
        @keyframes sSlideUp   { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
        @keyframes sBlurIn    { from{opacity:0;filter:blur(8px);letter-spacing:0.4em} to{opacity:1;filter:blur(0)} }
        @keyframes sLineGrow  { to { transform: scaleX(1); } }
        @keyframes sLoadFill  { from{width:0%} to{width:100%} }
        @keyframes sFadeIn    { to{opacity:1} }
        @keyframes sInnerHex  { to { stroke-dashoffset: 0; } }
        @keyframes sOrbitA    { from{transform:translate(-4px,-
